apiVersion: apps/v1
kind: StatefulSet                         #Definimos que es un StatefulSet
metadata:
  name: mongo
spec:
    serviceName: mongo                    #Nombre persistente de cada pod. En nuestro caso con 3 replicas siempre seran mongo-0, mongo-1 y momgo-2
    replicas: 3
    selector:
        matchLabels:
          app: mongo
    template:
        metadata:
          labels:
              app: mongo
        spec:
          containers:
          - name: mongo
            image: mongo
            ports:
            - containerPort: 27017
              name: mongo                